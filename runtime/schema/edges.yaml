# -----------------------------------------------------------------------------
# Bibliographic citation
# -----------------------------------------------------------------------------

cites:
  endpoints: { from: papers, to: papers }
  direction: directed
  workflow:  citation
  attributes:
    source: { type: enum, values: [semantic_scholar, parsed_bib, manual], required: true }
    date:   { type: date }
